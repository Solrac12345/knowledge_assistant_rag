# EN: CI/CD pipeline for RAG Knowledge Assistant
# FR: Pipeline CI/CD pour l'Assistant de Connaissance RAG

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff (linting + imports)
        run: uv run ruff check app/ tests/ --no-fix

      - name: Run Black (formatting check)
        run: uv run black app/ tests/ --check --diff

      - name: Run mypy (type checking)
        run: uv run mypy app/

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pytest with coverage
        env:
          LLM_PROVIDER: dummy
          CHROMA_DB_PATH: /tmp/chroma_test
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=65