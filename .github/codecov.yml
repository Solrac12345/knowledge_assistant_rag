# EN: Codecov configuration for coverage reporting
# FR: Configuration Codecov pour les rapports de couverture

coverage:
  status:
    project:
      default:
        target: 80%    # Require at least 80% coverage
        threshold: 5%  # Allow 5% drop before failing
    patch:
      default:
        target: 90%    # New code should have 90%+ coverage

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false